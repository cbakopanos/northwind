name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - run: dotnet build --configuration Release

  web:
    name: Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Northwind.Web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/Northwind.Web/package-lock.json
      - run: npm ci
      - run: npm run build
